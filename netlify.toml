[build]
  command = "npx prisma generate && next build"
  publish = ".next"

[build.environment]
  NODE_ENV = "production"
  # Prisma needs to know we're using PostgreSQL
  PRISMA_ENGINES_MIRROR = "https://prisma-builds.prisma-data.net/"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect www to non-www
[[redirects]]
  from = "https://www.wifimurahbandung.web.id/*"
  to = "https://wifimurahbandung.web.id/:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
