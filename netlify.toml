[build]
  command = """
    npx prisma generate &&
    if [ -n \"$DATABASE_URL\" ]; then
      npx prisma db push --accept-data-loss;
    fi &&
    next build
  """
  publish = ".next"

[build.environment]
  NODE_ENV = "production"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect www to non-www (optional)
[[redirects]]
  from = "https://www.wifimurahbandung.web.id/*"
  to = "https://wifimurahbandung.web.id/:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
