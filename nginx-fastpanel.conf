# ============================================
# Nginx Configuration for FastPanel
# ============================================
# Add this in FastPanel > Sites > wifimurahbandung.web.id > Config
#
# In FastPanel:
# 1. Create a new site: wifimurahbandung.web.id
# 2. Set site type to "Proxy"
# 3. Or use PHP/HTML type and replace the config with this
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name wifimurahbandung.web.id www.wifimurahbandung.web.id;

    # Redirect HTTP to HTTPS (after SSL is set up via FastPanel)
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Cache static assets
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Cache images
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size
    client_max_body_size 10M;
}

# After setting up SSL via FastPanel, the HTTPS config will be auto-generated.
# Just make sure the proxy_pass and location blocks are preserved in the HTTPS server block too.
